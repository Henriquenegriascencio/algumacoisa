<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>.</title>
  <style>
    video {
      width: 300px;
      height: 200px;
      background: #000;
      display:flex; justify-content:center; align-items:center; height:100vh;
      width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0;
      z-index:-1
    }
  </style>
</head>
<body>
    <video id="player" loop playsinline>
    <button id="playBtn">Não clique</button>
    <source src="badapple.mp4" type="video/mp4">
  </video>

  <script>
    const vid = document.getElementById("player");
    vid.addEventListener("click", () => {
      vid.muted = false;
      vid.play();
    });
  </script>
</body>
</html>
